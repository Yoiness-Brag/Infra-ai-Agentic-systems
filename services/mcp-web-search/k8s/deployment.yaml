apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-web-search
  namespace: ai-platform
  labels:
    app: mcp-web-search
    component: mcp-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-web-search
  template:
    metadata:
      labels:
        app: mcp-web-search
        component: mcp-tool
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-web-search
          image: mvp/mcp-web-search:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: HOME
              value: "/tmp"
            - name: XDG_CACHE_HOME
              value: "/tmp"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            tcpSocket:
              port: 3001
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-web-search
  namespace: ai-platform
  labels:
    app: mcp-web-search
spec:
  selector:
    app: mcp-web-search
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP

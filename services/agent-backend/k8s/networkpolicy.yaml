---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-backend-ingress
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: agent-backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-gateway
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-observability
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-backend-egress
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: agent-backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent-backend
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: falkordb
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: mcp-web-search
      ports:
        - protocol: TCP
          port: 3001
    - to:
        - podSelector:
            matchLabels:
              app: mcp-graphiti-memory
      ports:
        - protocol: TCP
          port: 3002
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
      ports:
        - protocol: TCP
          port: 8083
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-gateway
      ports:
        - protocol: TCP
          port: 80
    - ports:
        - protocol: TCP
          port: 443

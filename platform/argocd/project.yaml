apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra-ai-mvp
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: infra-ai-mvp
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Infra-AI MVP — kagent agent on k3d (SPEC.md)
  sourceRepos:
    - https://github.com/YounssBrag/Infra-ai-Agentic-systems.git
    - oci://ghcr.io/kagent-dev/*
    - https://charts.konghq.com
    - ghcr.io/kagent-dev/*
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: ai-gateway
    - server: https://kubernetes.default.svc
      namespace: ai-platform
    - server: https://kubernetes.default.svc
      namespace: kagent
    - server: https://kubernetes.default.svc
      namespace: ai-observability
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

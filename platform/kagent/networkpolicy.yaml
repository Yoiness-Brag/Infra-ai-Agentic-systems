---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kagent-allow-ingress
  namespace: kagent
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
      ports:
        - protocol: TCP
          port: 8083
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-observability
      ports:
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kagent-allow-egress
  namespace: kagent
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
      ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 3002
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-gateway
      ports:
        - protocol: TCP
          port: 8000
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

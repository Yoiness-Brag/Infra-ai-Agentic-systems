apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai-observability

resources:
  - prometheus.yaml
  - grafana.yaml

configMapGenerator:
  - name: grafana-dashboard-mvp-agent
    files:
      - mvp-agent.json=dashboards/mvp-agent.json

generatorOptions:
  disableNameSuffixHash: true

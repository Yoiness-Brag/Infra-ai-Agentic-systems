---
apiVersion: v1
kind: Service
metadata:
  name: falkordb
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: falkordb
    app: falkordb
    app.kubernetes.io/part-of: ai-platform
    app.kubernetes.io/component: graph-memory
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: falkordb
  ports:
    - name: resp
      port: 6379
      targetPort: resp
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: falkordb
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: falkordb
    app.kubernetes.io/part-of: ai-platform
    app.kubernetes.io/component: graph-memory
spec:
  serviceName: falkordb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: falkordb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: falkordb
        app: falkordb
        app.kubernetes.io/part-of: ai-platform
        app.kubernetes.io/component: graph-memory
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: falkordb
          image: falkordb/falkordb:v4.2.2
          imagePullPolicy: IfNotPresent
          env:
            - name: FALKORDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: falkordb-auth
                  key: FALKORDB_PASSWORD
                  optional: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -n "$FALKORDB_PASSWORD" ]; then
                exec redis-server \
                  --protected-mode no \
                  --dir /data \
                  --loadmodule /FalkorDB/bin/src/falkordb.so \
                  --requirepass "$FALKORDB_PASSWORD"
              else
                exec redis-server \
                  --protected-mode no \
                  --dir /data \
                  --loadmodule /FalkorDB/bin/src/falkordb.so
              fi
          ports:
            - name: resp
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'redis-cli -a "${FALKORDB_PASSWORD:-}" --no-auth-warning ping | grep -q PONG'
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'redis-cli -a "${FALKORDB_PASSWORD:-}" --no-auth-warning ping | grep -q PONG'
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: falkordb
          app.kubernetes.io/part-of: ai-platform
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falkordb-allow-ingress
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: falkordb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agent-backend
        - podSelector:
            matchLabels:
              app: mcp-graphiti-memory
      ports:
        - protocol: TCP
          port: 6379
